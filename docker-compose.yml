services:
  app:
    build: .
    container_name: neo-ntopia
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ntopia_data:/app/data
      - ntopia_uploads:/app/public/uploads
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 512M
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  nginx:
    image: nginx:stable-alpine
    container_name: neo-ntopia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ntopia_uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  ntopia_data:
  ntopia_uploads:
